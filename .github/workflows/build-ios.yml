name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"

      - run: flutter pub get

      - name: Build IPA
        run: flutter build ipa --target=test/test_UVR.dart --release --no-codesign -v --build-name=1.0.0 --build-number=1

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/
