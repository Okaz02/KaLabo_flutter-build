name: Mac GUI Session

on:
  workflow_dispatch:

jobs:
  gui-session:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install NoMachine
        run: |
            curl -o nomachine.dmg https://web9001.nomachine.com/download/9.6/MacOSX/nomachine_9.6.3_1.dmg
            hdiutil attach nomachine.dmg
            sudo installer -pkg /Volumes/NoMachine/NoMachine.pkg -target /
            hdiutil detach /Volumes/NoMachine || true

      - name: Set runner password
        env:
            RUNNER_PASSWORD: ${{ secrets.RUNNER_PASSWORD }}
        run: |
            CURRENT_PASSWORD=$(sudo ruby -e 'key = [125, 137, 82, 35, 210, 188, 221, 234, 163, 185, 31]; IO.read("/etc/kcpassword").bytes.each_with_index { |b, i| e = b ^ key[i % key.size]; break if e == 0; print [e].pack("U*") }')
            sudo sysadminctl \
              -adminUser runner \
              -adminPassword "$CURRENT_PASSWORD" \
              -resetPasswordFor runner \
              -newPassword "$RUNNER_PASSWORD"

      - name: Start NoMachine
        run: |
          sudo /etc/NX/nxserver --startup
          sleep 5

      - name: Install cloudflared
        run: brew install cloudflared

      - name: Start Cloudflare Tunnel for NoMachine
        run: |
          cloudflared tunnel --url tcp://localhost:4000 > tunnel.log 2>&1 &
          sleep 10

      - name: Print connection info
        run: |
          echo "===================================="
          cat tunnel.log
          echo "===================================="

      - name: Keep session alive
        run: sleep 3000